services:
  model-service:
    build:
      context: ./apps/plant-disease-detection
      dockerfile: Dockerfile
    container_name: model-service
    ports:
      - "5000:5000"

  rag-service:
    build:
      context: ./apps/rag-service
      dockerfile: Dockerfile
    container_name: rag-service
    env_file:
      - .env
    depends_on:
      - qdrant
      - ollama
    volumes:
      - ./data/rag_kb:/data/rag_kb
    ports:
      - "8001:8001"

  agent-orchestrator:
    build:
      context: ./apps/agent-orchestrator
      dockerfile: Dockerfile
    container_name: agent-orchestrator
    env_file:
      - .env
    depends_on:
      - model-service
      - rag-service
      - ollama
    ports:
      - "8000:8000"

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:0.6.0
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  qdrant_data:
  ollama_data:
